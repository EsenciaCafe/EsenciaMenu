name: Actualizar lista de imágenes popup

on:
  push:
    paths:
      - "assets/popup/**"
      - ".github/workflows/update-popup-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-images-json:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar assets/popup/images.json
        run: |
          mkdir -p assets/popup

          python3 - <<'PY'
          from pathlib import Path
          import json

          folder = Path("assets/popup")
          allowed = {".jpg", ".jpeg", ".png", ".webp", ".gif", ".avif"}

          files = sorted(
              p.name for p in folder.iterdir()
              if p.is_file()
              and p.suffix.lower() in allowed
              and p.name != "images.json"
          )

          (folder / "images.json").write_text(
              json.dumps(files, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/popup/images.json

          if git diff --cached --quiet; then
            echo "No hay cambios en images.json"
          else
            git commit -m "Actualizar lista de imágenes popup"
            git push
          fi
